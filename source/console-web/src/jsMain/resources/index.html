<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Session Console</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, sans-serif;
            background: #f5f7fb;
            color: #172033;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
        }
        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .hero, .layout {
            display: grid;
            gap: 24px;
        }
        .hero {
            grid-template-columns: 1.5fr 1fr;
            margin-bottom: 24px;
        }
        .layout {
            grid-template-columns: 1.1fr 1fr;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #d8e0f0;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(70, 90, 130, 0.08);
            padding: 20px;
        }
        h1, h2, h3, p {
            margin-top: 0;
        }
        .primary-button {
            border: 0;
            border-radius: 999px;
            background: #2f6df6;
            color: white;
            padding: 12px 18px;
            font-weight: 700;
            cursor: pointer;
        }
        .primary-button:disabled {
            opacity: 0.6;
            cursor: wait;
        }
        .session-list, .events {
            display: grid;
            gap: 12px;
        }
        .session-card {
            border: 1px solid #d8e0f0;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            background: #fff;
        }
        .session-card.selected {
            border-color: #2f6df6;
            box-shadow: 0 0 0 3px rgba(47, 109, 246, 0.15);
        }
        .session-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            background: #e6ecfb;
            color: #244a9f;
        }
        .badge.RUNNING { background: #e7f7ef; color: #1a7f45; }
        .badge.SUCCEEDED { background: #e8f7f3; color: #0d7a63; }
        .badge.FAILED { background: #fdebec; color: #b42318; }
        .progress {
            height: 10px;
            background: #e8edf7;
            border-radius: 999px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2f6df6 0%, #57b8ff 100%);
        }
        .muted {
            color: #56627a;
        }
        .error {
            color: #b42318;
        }
        .event {
            border-left: 3px solid #2f6df6;
            padding-left: 12px;
        }
        .events {
            max-height: 720px;
            overflow: auto;
        }
        .strong {
            font-weight: 700;
        }
        @media (max-width: 960px) {
            .hero, .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="/web/console-web.js"></script>
</body>
</html>
